services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finevent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finevent}
      POSTGRES_USER: ${POSTGRES_USER:-finevent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-55433}:5432"
    volumes:
      - finevent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finevent} -d ${POSTGRES_DB:-finevent}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: finevent-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FINEVENT_WORKSPACE_ROOT: /app
      FINEVENT_ALLOWED_ORIGINS: ${FINEVENT_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-finevent}
      POSTGRES_USER: ${POSTGRES_USER:-finevent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DSN: ""
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs:ro
      - ./infra/postgres:/app/infra/postgres:ro
      - ./data:/app/data
      - ./reports:/app/reports
      - ./runs:/app/runs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    container_name: finevent-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_FINEVENT_API_BASE_URL: ${NEXT_PUBLIC_FINEVENT_API_BASE_URL:-http://127.0.0.1:18000}
      NEXT_TELEMETRY_DISABLED: 1
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/admin:/app
      - finevent_frontend_node_modules:/app/node_modules
      - finevent_frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/admin').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  finevent_postgres_data:
  finevent_frontend_node_modules:
  finevent_frontend_next:
