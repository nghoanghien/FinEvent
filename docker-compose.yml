services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finevent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finevent}
      POSTGRES_USER: ${POSTGRES_USER:-finevent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-55433}:5432"
    volumes:
      - finevent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finevent} -d ${POSTGRES_DB:-finevent}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  finevent_postgres_data:
