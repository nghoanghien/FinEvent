[alembic]
script_location = infra/alembic
prepend_sys_path = .
timezone = UTC

# Runtime URL is resolved in infra/alembic/env.py from POSTGRES_DSN or configs/default.yaml.
sqlalchemy.url = postgresql+psycopg://user:password@localhost:5432/finevent

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
